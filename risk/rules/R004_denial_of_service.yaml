# 拒绝服务漏洞
rule_id: R004
name: 拒绝服务 (DoS) 漏洞
severity: MEDIUM
description: >
  产品存在可导致服务不可用的漏洞。
  相关 CWE：CWE-400 (资源耗尽)、CWE-770 (无限制资源分配)、
  CWE-835 (无限循环)。
tags: [dos, availability]
match_mode: all
conditions:
  - type: cwe_match
    operator: in
    value: [CWE-400, CWE-770, CWE-835, CWE-674]

recommendations:
  - title: 配置速率限制与资源配额
    description: >
      在负载均衡器或应用层启用请求速率限制，
      为关键资源（连接数、内存、CPU）设置上限。
    priority: P2
    timeline: 7 天内
    action_type: config
    estimated_effort: 中

  - title: 部署高可用架构
    description: >
      确保关键业务存在冗余副本，单点 DoS 不会导致整体服务中断。
    priority: P3
    timeline: 30 天内
    action_type: architect
    estimated_effort: 高

  - title: 应用修复补丁
    description: 升级至官方修复版本。
    priority: P2
    timeline: 7 天内
    action_type: patch
    estimated_effort: 中
