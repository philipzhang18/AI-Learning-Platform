version: '3.8'

# GPU 加速服务（轻量版）
# 仅包含向量搜索所需的服务
# 主架构：SQLite + WSL Redis + GPU 向量搜索（可选）

services:
  # ==================== GPU 加速服务 ====================

  # Ollama - 本地 LLM 服务（GPU 加速）
  ollama:
    image: ollama/ollama:latest
    container_name: cve-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - cve-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - OLLAMA_NUM_GPU=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Open WebUI - LLM 管理界面
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: cve-open-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
    volumes:
      - open-webui-data:/app/backend/data
    networks:
      - cve-network
    depends_on:
      - ollama

  # PostgreSQL + pgvector（向量数据库）
  postgres-vector:
    image: ankane/pgvector:latest
    container_name: cve-postgres-vector
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-defaultpassword}
      POSTGRES_DB: cve_vectors
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-vector-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cve-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin - PostgreSQL 管理界面
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cve-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - cve-network
    depends_on:
      - postgres-vector

volumes:
  ollama-data:
    driver: local
  open-webui-data:
    driver: local
  postgres-data:
    driver: local
  pgadmin-data:
    driver: local

networks:
  cve-network:
    driver: bridge
