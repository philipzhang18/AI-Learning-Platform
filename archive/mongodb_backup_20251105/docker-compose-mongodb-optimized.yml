version: '3.8'

services:
  # MongoDB 7.0 - 主存储数据库（优化版）
  mongodb:
    image: mongo:7.0
    container_name: cve-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-secure_password}
      MONGO_INITDB_DATABASE: cve_database
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./init-mongodb.js:/docker-entrypoint-initdb.d/init.js:ro
    command: mongod --auth --wiredTigerCacheSizeGB 1
    networks:
      - cve_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'          # 优化：降低到 1 核
          memory: 1.5G         # 优化：降低到 1.5GB
        reservations:
          cpus: '0.5'
          memory: 512M

  # Redis 7 - 缓存层（优化版）
  redis:
    image: redis:7-alpine
    container_name: cve-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-defaultpassword}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
      --replica-lazy-flush yes
      --io-threads 2
      --io-threads-do-reads yes
    volumes:
      - redis_data:/data
    networks:
      - cve_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-defaultpassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'          # 优化：降低到 0.5 核
          memory: 1G           # 优化：降低到 1GB
        reservations:
          cpus: '0.25'
          memory: 256M

  # Redis管理界面（优化版）
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: cve-redis-commander
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-defaultpassword}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cve_network
    deploy:
      resources:
        limits:
          cpus: '0.25'         # 优化：降低到 0.25 核
          memory: 128M         # 优化：降低到 128MB
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

networks:
  cve_network:
    driver: bridge
