version: '3.8'

services:
  # MongoDB 数据库
  mongodb:
    image: mongo:6.0
    container_name: cve-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-defaultpassword}
      MONGO_INITDB_DATABASE: cve_monitor
    volumes:
      - mongo-data:/data/db
    networks:
      - cve-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: cve-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-defaultpassword}
    volumes:
      - redis-data:/data
    networks:
      - cve-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 后端 API 服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cve-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://admin:${MONGO_PASSWORD:-defaultpassword}@mongodb:27017/cve_monitor?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-defaultpassword}@redis:6379/0
      NVD_API_KEY: ${NVD_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
      PYTHONUNBUFFERED: 1
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./:/app
      - ./cve_data:/app/cve_data
    networks:
      - cve-network
    command: python main.py

volumes:
  mongo-data:
    driver: local
  redis-data:
    driver: local

networks:
  cve-network:
    driver: bridge