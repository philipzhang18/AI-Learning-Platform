<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVE 漏洞监控系统 V2.0 - Web界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部样式 */
        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header .subtitle {
            color: #7f8c8d;
            font-size: 1.1em;
        }

        /* 控制面板 */
        .control-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-panel label {
            font-weight: 600;
            color: #2c3e50;
        }

        .control-panel select {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .control-panel select:focus {
            outline: none;
            border-color: #667eea;
        }

        /* 搜索栏 */
        .search-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-panel select, .search-panel input {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .search-panel select:focus, .search-panel input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
        }

        .search-result {
            color: #667eea;
            font-weight: 600;
            margin-left: auto;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .btn-info {
            background: #3498db;
            color: white;
        }

        .btn-info:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .stat-card .icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 15px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .stat-card.total .icon { background: linear-gradient(135deg, #667eea, #764ba2); }
        .stat-card.critical .icon { background: linear-gradient(135deg, #ff6b6b, #c0392b); }
        .stat-card.high .icon { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .stat-card.medium .icon { background: linear-gradient(135deg, #f1c40f, #f39c12); }
        .stat-card.low .icon { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .stat-card.resolved .icon { background: linear-gradient(135deg, #1abc9c, #16a085); }

        .stat-card .label {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .value {
            font-size: 36px;
            font-weight: bold;
            color: #2c3e50;
        }

        /* 数据表格 */
        .data-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            overflow-x: auto;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.5em;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            overflow: hidden;
        }

        .data-table thead {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .data-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .data-table tbody tr {
            border-bottom: 1px solid #ecf0f1;
            transition: background 0.3s;
        }

        .data-table tbody tr:hover {
            background: #f8f9fa;
        }

        .data-table tbody tr.hidden {
            display: none;
        }

        .data-table td {
            padding: 15px;
            font-size: 14px;
        }

        .severity-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .severity-badge.critical {
            background: #ffebee;
            color: #c62828;
        }

        .severity-badge.high {
            background: #fff3e0;
            color: #ef6c00;
        }

        .severity-badge.medium {
            background: #fff9c4;
            color: #f9a825;
        }

        .severity-badge.low {
            background: #f1f8e9;
            color: #558b2f;
        }

        /* 解决方案样式 */
        .solution-text {
            max-width: 350px;
            font-size: 12px;
            line-height: 1.4;
            color: #555;
        }

        .solution-tag {
            display: inline-block;
            padding: 2px 8px;
            margin-right: 5px;
            background: #e3f2fd;
            color: #1565c0;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        /* 日志区域 */
        .log-section {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 25px;
            color: #00ff00;
            font-family: "Consolas", "Monaco", monospace;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 30px;
        }

        .log-entry {
            margin-bottom: 8px;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .control-panel, .search-panel {
                flex-direction: column;
            }

            .search-input {
                width: 100%;
            }

            .data-table {
                font-size: 12px;
            }

            .data-table th, .data-table td {
                padding: 10px;
            }

            .solution-text {
                max-width: 200px;
            }
        }

        /* 详情弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5em;
            color: #2c3e50;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #7f8c8d;
            cursor: pointer;
        }

        .modal-close:hover {
            color: #2c3e50;
        }

        /* 状态指示器 */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-indicator.ready {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-indicator.collecting {
            background: #fff3e0;
            color: #ef6c00;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* 高亮搜索结果 */
        .highlight {
            background-color: yellow;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>
                <span>🛡️</span>
                <span>CVE 漏洞监控系统 V2.0</span>
            </h1>
            <div class="subtitle">实时采集、智能分析、解决方案推荐</div>
        </div>

        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="control-group">
                <label for="daysSelect">采集天数范围:</label>
                <select id="daysSelect">
                    <option value="1">最近 1 天</option>
                    <option value="3">最近 3 天</option>
                    <option value="7" selected>最近 7 天</option>
                    <option value="14">最近 14 天</option>
                    <option value="30">最近 30 天</option>
                </select>
            </div>

            <div class="control-group">
                <button id="startBtn" class="btn btn-primary" onclick="startCollection()">
                    <span>▶</span>
                    <span>开始采集</span>
                </button>
                <button id="stopBtn" class="btn btn-danger" onclick="stopCollection()" disabled>
                    <span>■</span>
                    <span>停止采集</span>
                </button>
            </div>

            <div class="status-indicator ready" id="statusIndicator">
                <span>⚪</span>
                <span>就绪</span>
            </div>
        </div>

        <!-- 搜索栏 -->
        <div class="search-panel">
            <label>搜索类型:</label>
            <select id="searchType">
                <option value="all">全部字段</option>
                <option value="cve_id">CVE编号</option>
                <option value="severity">严重等级</option>
                <option value="description">描述</option>
                <option value="solution">解决方案</option>
            </select>

            <label>关键字:</label>
            <input type="text" class="search-input" id="searchInput" placeholder="输入搜索关键字..." onkeyup="performSearch()">

            <button class="btn btn-info" onclick="performSearch()">
                <span>🔍</span>
                <span>搜索</span>
            </button>

            <button class="btn btn-secondary" onclick="clearSearch()">
                <span>清空</span>
            </button>

            <div class="search-result" id="searchResult"></div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card total">
                <div class="icon">📊</div>
                <div class="label">总计</div>
                <div class="value" id="totalCount">0</div>
            </div>
            <div class="stat-card critical">
                <div class="icon">🔴</div>
                <div class="label">严重</div>
                <div class="value" id="criticalCount">0</div>
            </div>
            <div class="stat-card high">
                <div class="icon">🟠</div>
                <div class="label">高危</div>
                <div class="value" id="highCount">0</div>
            </div>
            <div class="stat-card medium">
                <div class="icon">🟡</div>
                <div class="label">中危</div>
                <div class="value" id="mediumCount">0</div>
            </div>
            <div class="stat-card low">
                <div class="icon">🟢</div>
                <div class="label">低危</div>
                <div class="value" id="lowCount">0</div>
            </div>
            <div class="stat-card resolved">
                <div class="icon">✅</div>
                <div class="label">已分析</div>
                <div class="value" id="resolvedCount">0</div>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="data-section">
            <div class="section-header">
                <h2 class="section-title">
                    <span>📋</span>
                    <span>CVE 数据列表</span>
                </h2>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 15px; color: #7f8c8d;">正在采集数据...</p>
            </div>

            <table class="data-table" id="dataTable">
                <thead>
                    <tr>
                        <th>CVE 编号</th>
                        <th>严重等级</th>
                        <th>CVSS 评分</th>
                        <th>发布日期</th>
                        <th>描述</th>
                        <th>解决方案</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- 数据将通过 JavaScript 动态添加 -->
                </tbody>
            </table>
        </div>

        <!-- 日志区域 -->
        <div class="log-section" id="logSection">
            <div class="log-entry">💻 系统已准备就绪，等待指令...</div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">CVE 详细信息</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modalBody">
                <!-- 详细信息将动态插入 -->
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let isCollecting = false;
        let cveData = [];
        let filteredData = [];
        let collectInterval = null;

        // 生成解决方案
        function generateSolution(cve) {
            const severity = cve.severity;
            const description = cve.description.toLowerCase();
            let solution = [];

            // 根据严重等级
            if (severity === 'CRITICAL' || severity === 'HIGH') {
                solution.push('<span class="solution-tag">紧急</span>');
                solution.push('立即采取行动');
            } else if (severity === 'MEDIUM') {
                solution.push('<span class="solution-tag">重要</span>');
                solution.push('计划修复');
            } else {
                solution.push('<span class="solution-tag">常规</span>');
                solution.push('定期更新');
            }

            // 根据描述判断类型
            if (description.includes('remote code execution') || description.includes('rce')) {
                solution.push(' | 应用官方补丁 | 限制网络访问');
            } else if (description.includes('sql injection')) {
                solution.push(' | 参数化查询 | 输入验证');
            } else if (description.includes('cross-site scripting') || description.includes('xss')) {
                solution.push(' | 编码输出 | CSP策略');
            } else if (description.includes('buffer overflow')) {
                solution.push(' | 更新版本 | 启用ASLR');
            } else if (description.includes('denial of service') || description.includes('dos')) {
                solution.push(' | 配置限流 | DDoS防护');
            } else if (description.includes('privilege escalation')) {
                solution.push(' | 系统补丁 | 权限审计');
            } else if (description.includes('authentication') || description.includes('authorization')) {
                solution.push(' | 强化认证 | MFA部署');
            } else if (description.includes('information disclosure')) {
                solution.push(' | 信息脱敏 | 访问控制');
            } else {
                solution.push(' | 查看官方公告 | 评估影响');
            }

            return solution.join('');
        }

        // 搜索功能
        function performSearch() {
            const searchType = document.getElementById('searchType').value;
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();

            if (!keyword) {
                filteredData = cveData;
                refreshTable();
                document.getElementById('searchResult').textContent = '';
                return;
            }

            filteredData = cveData.filter(cve => {
                if (searchType === 'all') {
                    // 搜索所有字段
                    return Object.values(cve).some(value =>
                        String(value).toLowerCase().includes(keyword)
                    );
                } else {
                    // 搜索特定字段
                    const fieldValue = String(cve[searchType] || '').toLowerCase();
                    return fieldValue.includes(keyword);
                }
            });

            refreshTable();
            document.getElementById('searchResult').textContent =
                `找到 ${filteredData.length} 条匹配结果`;

            addLog(`搜索 "${keyword}" - 找到 ${filteredData.length} 条结果`);
        }

        // 清空搜索
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResult').textContent = '';
            filteredData = cveData;
            refreshTable();
            addLog('已清空搜索条件');
        }

        // 刷新表格显示
        function refreshTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            const dataToShow = filteredData.length > 0 ? filteredData : cveData;

            dataToShow.forEach(cve => {
                addCveToTable(cve);
            });

            updateStats();
        }

        // 开始采集
        async function startCollection() {
            if (isCollecting) return;

            isCollecting = true;
            cveData = [];
            filteredData = [];

            // 更新 UI
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('loading').classList.add('active');

            const statusIndicator = document.getElementById('statusIndicator');
            statusIndicator.className = 'status-indicator collecting';
            statusIndicator.innerHTML = '<span>🔴</span><span>采集中...</span>';

            // 清空表格
            document.getElementById('tableBody').innerHTML = '';

            // 重置统计
            updateStats();

            const days = document.getElementById('daysSelect').value;
            addLog(`开始采集最近 ${days} 天的 CVE 数据...`);

            try {
                // 调用 API 获取数据
                const response = await fetch(`http://localhost:8000/api/v1/cves/latest?limit=50`);

                if (response.ok) {
                    const result = await response.json();
                    const cves = result.data || [];

                    addLog(`成功获取 ${cves.length} 条 CVE 数据`);

                    // 添加到表格
                    cves.forEach(cve => {
                        cve.solution = generateSolution(cve);
                        addCveToTable(cve);
                        cveData.push(cve);
                    });

                    // 更新统计
                    updateStats();

                    addLog('数据采集完成！');
                } else {
                    // 如果 API 不可用，使用模拟数据
                    addLog('使用模拟数据演示...');
                    simulateDataCollection();
                }
            } catch (error) {
                addLog(`连接服务器失败，使用模拟数据: ${error.message}`);
                // 使用模拟数据
                simulateDataCollection();
            }

            // 隐藏加载动画
            setTimeout(() => {
                document.getElementById('loading').classList.remove('active');
                if (!isCollecting) {
                    statusIndicator.className = 'status-indicator ready';
                    statusIndicator.innerHTML = '<span>⚪</span><span>就绪</span>';
                }
            }, 2000);
        }

        // 停止采集
        function stopCollection() {
            isCollecting = false;

            // 更新 UI
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('loading').classList.remove('active');

            const statusIndicator = document.getElementById('statusIndicator');
            statusIndicator.className = 'status-indicator ready';
            statusIndicator.innerHTML = '<span>⚪</span><span>就绪</span>';

            if (collectInterval) {
                clearInterval(collectInterval);
                collectInterval = null;
            }

            addLog('数据采集已停止');
        }

        // 模拟数据采集
        function simulateDataCollection() {
            const severities = ['CRITICAL', 'HIGH', 'MEDIUM', 'LOW'];
            const products = ['Apache', 'Microsoft', 'Linux', 'Chrome', 'Firefox', 'OpenSSL', 'Docker', 'Kubernetes'];
            const vulnerabilities = [
                'remote code execution vulnerability',
                'SQL injection vulnerability',
                'cross-site scripting vulnerability',
                'buffer overflow vulnerability',
                'denial of service vulnerability',
                'privilege escalation vulnerability',
                'authentication bypass vulnerability',
                'information disclosure vulnerability'
            ];

            let count = 0;
            collectInterval = setInterval(() => {
                if (!isCollecting || count >= 20) {
                    stopCollection();
                    return;
                }

                const vulnType = vulnerabilities[count % vulnerabilities.length];
                const cve = {
                    cve_id: `CVE-2024-${12345 + count}`,
                    title: `${products[count % products.length]} Security Vulnerability`,
                    severity: severities[count % severities.length],
                    cvss_score: (10 - count * 0.3).toFixed(1),
                    published_date: new Date(Date.now() - count * 86400000).toISOString().split('T')[0],
                    description: `A ${vulnType} has been discovered in ${products[count % products.length]} that could allow an attacker to compromise the system. This vulnerability affects multiple versions and requires immediate attention.`
                };

                cve.solution = generateSolution(cve);
                addCveToTable(cve);
                cveData.push(cve);
                updateStats();

                count++;
                addLog(`获取 CVE: ${cve.cve_id}`);
            }, 500);
        }

        // 添加 CVE 到表格
        function addCveToTable(cve) {
            const tbody = document.getElementById('tableBody');
            const tr = document.createElement('tr');

            const severityClass = cve.severity.toLowerCase();
            const description = cve.description.length > 150
                ? cve.description.substring(0, 150) + '...'
                : cve.description;

            tr.innerHTML = `
                <td><strong>${cve.cve_id}</strong></td>
                <td><span class="severity-badge ${severityClass}">${cve.severity}</span></td>
                <td>${cve.cvss_score}</td>
                <td>${cve.published_date}</td>
                <td>${description}</td>
                <td><div class="solution-text">${cve.solution}</div></td>
                <td>
                    <button class="btn btn-primary" style="padding: 6px 12px; font-size: 12px;"
                            onclick="showDetail('${cve.cve_id}')">
                        查看详情
                    </button>
                </td>
            `;

            tbody.insertBefore(tr, tbody.firstChild);
        }

        // 更新统计信息
        function updateStats() {
            const dataToCount = filteredData.length > 0 ? filteredData : cveData;

            const stats = {
                total: dataToCount.length,
                critical: 0,
                high: 0,
                medium: 0,
                low: 0,
                resolved: 0
            };

            dataToCount.forEach(cve => {
                switch(cve.severity) {
                    case 'CRITICAL': stats.critical++; break;
                    case 'HIGH': stats.high++; break;
                    case 'MEDIUM': stats.medium++; break;
                    case 'LOW': stats.low++; break;
                }
                if (cve.solution) {
                    stats.resolved++;
                }
            });

            document.getElementById('totalCount').textContent = stats.total;
            document.getElementById('criticalCount').textContent = stats.critical;
            document.getElementById('highCount').textContent = stats.high;
            document.getElementById('mediumCount').textContent = stats.medium;
            document.getElementById('lowCount').textContent = stats.low;
            document.getElementById('resolvedCount').textContent = stats.resolved;
        }

        // 显示详情
        function showDetail(cveId) {
            const cve = cveData.find(c => c.cve_id === cveId);
            if (!cve) return;

            document.getElementById('modalTitle').textContent = `CVE 详细信息 - ${cve.cve_id}`;
            document.getElementById('modalBody').innerHTML = `
                <div style="line-height: 1.8;">
                    <p><strong>CVE 编号:</strong> ${cve.cve_id}</p>
                    <p><strong>严重等级:</strong> <span class="severity-badge ${cve.severity.toLowerCase()}">${cve.severity}</span></p>
                    <p><strong>CVSS 评分:</strong> ${cve.cvss_score}</p>
                    <p><strong>发布日期:</strong> ${cve.published_date}</p>

                    <p><strong>描述:</strong></p>
                    <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0;">
                        ${cve.description}
                    </div>

                    <p><strong>推荐解决方案:</strong></p>
                    <div style="background: #e3f2fd; padding: 15px; border-radius: 8px; margin: 10px 0;">
                        ${cve.solution}
                    </div>

                    <p style="margin-top: 20px;">
                        <strong>参考链接:</strong><br>
                        <a href="https://nvd.nist.gov/vuln/detail/${cve.cve_id}" target="_blank"
                           style="color: #667eea; text-decoration: none;">
                            🔗 NVD 详细信息
                        </a><br>
                        <a href="https://cve.mitre.org/cgi-bin/cvename.cgi?name=${cve.cve_id}" target="_blank"
                           style="color: #667eea; text-decoration: none;">
                            🔗 MITRE CVE 记录
                        </a>
                    </p>
                </div>
            `;

            document.getElementById('detailModal').classList.add('active');
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        // 添加日志
        function addLog(message) {
            const logSection = document.getElementById('logSection');
            const timestamp = new Date().toLocaleTimeString('zh-CN');
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.textContent = `[${timestamp}] ${message}`;
            logSection.appendChild(logEntry);

            // 自动滚动到底部
            logSection.scrollTop = logSection.scrollHeight;

            // 限制日志数量
            if (logSection.children.length > 100) {
                logSection.removeChild(logSection.firstChild);
            }
        }

        // 点击弹窗外部关闭
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            addLog('系统初始化完成 - V2.0 增强版');
            addLog('新增功能: 关键字搜索、解决方案推荐');
        });

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            // Ctrl+F 聚焦搜索框
            if (e.ctrlKey && e.key === 'f') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
            // ESC 清空搜索
            if (e.key === 'Escape') {
                clearSearch();
                closeModal();
            }
        });
    </script>
</body>
</html>
