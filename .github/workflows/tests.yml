name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov cryptography
          pip install requests aiohttp beautifulsoup4 feedparser python-dotenv typing-extensions

      - name: Install optional dependencies
        run: |
          pip install pandas numpy networkx matplotlib openpyxl
          pip install redis hiredis
        continue-on-error: true

      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
        run: |
          pytest tests/test_cve_utils.py tests/test_cache_utils.py tests/test_export_utils.py tests/test_error_utils.py tests/test_secure_config.py tests/test_user_preferences.py -v --tb=short

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          pytest --cov=. --cov-report=xml tests/test_cve_utils.py tests/test_cache_utils.py tests/test_export_utils.py
        continue-on-error: true
